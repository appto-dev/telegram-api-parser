name: Get new API version
run-name: 🚀 Update Telegram Bot API version (${{ github.actor }})
on:
  push:
    branches:
      - "main"
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force update even if no changes detected'
        required: false
        default: 'false'
        type: boolean
      manual_version:
        description: 'Вручную указать версию API (например 10.1). Если пусто — берётся последняя/текущая'
        required: false
        default: ''
        type: string
env:
  repo: 'appto-dev/telegram-bot-cast'
  repo-directory: 'telegram-bot-cast'
  laravel-repo: 'appto-dev/telegram-bot-cast-laravel'
  laravel-directory: 'telegram-bot-cast-laravel'

jobs:
  download-new-version:
    runs-on: ubuntu-22.04
    outputs:
      api_version: ${{ steps.download.outputs.api_version }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
      has_new_version: ${{ steps.requires_update.outputs.hasUpdate }}
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          rm -rf ${{ env.repo-directory }}
          rm -rf ${{ env.laravel-directory }}
          composer install --no-dev

      - name: Download version Telegram API
        id: download
        run: |
          if [[ -n "${{ inputs.manual_version }}" ]]; then
            echo "api_version=${{ inputs.manual_version }}" >> $GITHUB_OUTPUT
          else
            echo "api_version=$(php console telegram:parse)" >> $GITHUB_OUTPUT
          fi

      - name: Compute release tag
        id: tag
        run: |
          echo "release_tag=${{ vars.RELEASE_MAJOR }}.${{ vars.RELEASE_MINOR }}.${{ steps.download.outputs.api_version }}" >> $GITHUB_OUTPUT

      - name: Has new version
        id: requires_update
        run: |
          if [[ -n "$(git status --porcelain)" || -n "${{ inputs.manual_version }}" || "${{ inputs.force_release }}" == "true" ]]; then
            echo "hasUpdate=true" >> $GITHUB_OUTPUT
          else
            echo "hasUpdate=false" >> $GITHUB_OUTPUT
          fi

      - name: Update repository
        if: steps.requires_update.outputs.hasUpdate == 'true'
        run: |
          git add .
          git config --global user.email "${{ secrets.REPOSITORY_EMAIL }}"
          git config --global user.name "${{ github.actor }}"
          git diff --staged --quiet || git commit -m "[BOT] API ${{ steps.download.outputs.api_version }} | release ${{ steps.tag.outputs.release_tag }}"
          git push

