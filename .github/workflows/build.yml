name: Get new API version
run-name: 🚀 Update Telegram Bot API version (${{ github.actor }})
on:
  push:
    branches:
      - "main"
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release even if no changes detected'
        required: false
        default: 'false'
        type: boolean
env:
  repo: 'appto-dev/telegram-bot-cast'
  repo-directory: 'telegram-bot-cast'
  laravel-repo: 'appto-dev/telegram-bot-cast-laravel'
  laravel-directory: 'telegram-bot-cast-laravel'

jobs:
  download-new-version:
    runs-on: ubuntu-22.04
    outputs:
      api_version: ${{ steps.download.outputs.api_version }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          git pull
          rm -rf ${{ env.repo-directory }}
          rm -rf ${{ env.laravel-directory }}
          composer install --no-dev

      - name: Download version Telegram API
        id: download
        run: |
          echo "api_version=$(php console telegram:parse)" >> $GITHUB_OUTPUT

      - name: Compute release tag
        id: tag
        run: |
          echo "release_tag=${{ vars.RELEASE_MAJOR }}.${{ vars.RELEASE_MINOR }}.v${{ steps.download.outputs.api_version }}" >> $GITHUB_OUTPUT

      - name: Has new version
        id: requires_update
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "hasUpdate=true" >> $GITHUB_OUTPUT
          else
            echo "hasUpdate=false" >> $GITHUB_OUTPUT
          fi

      - name: Update repository
        if: steps.requires_update.outputs.hasUpdate == 'true'
        run: |
          git add .
          git config --global user.email "${{ secrets.REPOSITORY_EMAIL }}"
          git config --global user.name "${{ github.actor }}"
          git commit -m "[BOT] API ${{ steps.download.outputs.api_version }} | release ${{ steps.tag.outputs.release_tag }}"
          git push

  update-repo:
    runs-on: ubuntu-22.04
    needs: download-new-version
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Checkout api-parser
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          git pull
          composer install --no-dev

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: '${{ secrets.GH_ACTION_TELEGRAM_REPOSITORIES }}'
          repository: ${{ env.repo }}
          path: ${{ env.repo-directory }}

      - name: Generate files
        run: |
          rm -rf build
          php console telegram:generate php-new

      - name: Run PHP-CS-Fixer
        uses: erkenes/php-cs-fixer-action@php8.2-1.0.0

      - name: Copy files to repository
        run: |
          rm -rf ${{ env.repo-directory }}/src
          mv build/Appto/TelegramBot ${{ env.repo-directory }}/src

      - name: Check update
        id: check_update
        run: |
          cd ${{ env.repo-directory }}
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "hasUpdate=true" >> $GITHUB_OUTPUT
          else
            echo "hasUpdate=false" >> $GITHUB_OUTPUT
          fi

      - name: Push commit
        if: steps.check_update.outputs.hasUpdate == 'true' || inputs.force_release == 'true'
        run: |
          cd ${{ env.repo-directory }}
          git config user.email "${{ secrets.REPOSITORY_EMAIL }}"
          git config user.name "${{ github.actor }}"
          git add .
          git diff --staged --quiet || git commit -m "[BOT] API ${{ needs.download-new-version.outputs.api_version }} | release ${{ needs.download-new-version.outputs.release_tag }}"
          git push origin main

      - name: Create Release
        if: steps.check_update.outputs.hasUpdate == 'true' || inputs.force_release == 'true'
        run: |
          cd ${{ env.repo-directory }}
          TAG="${{ needs.download-new-version.outputs.release_tag }}"
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag "$TAG" -m "Version $TAG (Telegram API ${{ needs.download-new-version.outputs.api_version }})"
          git push origin "$TAG"

  update-laravel-version-repo:
    runs-on: ubuntu-22.04
    needs: download-new-version
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Checkout api-parser
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          git pull
          composer install --no-dev

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: '${{ secrets.GH_ACTION_TELEGRAM_REPOSITORIES }}'
          repository: ${{ env.laravel-repo }}
          path: ${{ env.laravel-directory }}

      - name: Generate files
        run: |
          rm -rf build
          php console telegram:generate php-new --useSpatie

      - name: Run PHP-CS-Fixer
        uses: erkenes/php-cs-fixer-action@php8.2-1.0.0

      - name: Copy files to repository
        run: |
          rm -rf ${{ env.laravel-directory }}/src
          mv build/Appto/TelegramBot ${{ env.laravel-directory }}/src

      - name: Check update
        id: check_update
        run: |
          cd ${{ env.laravel-directory }}
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "hasUpdate=true" >> $GITHUB_OUTPUT
          else
            echo "hasUpdate=false" >> $GITHUB_OUTPUT
          fi

      - name: Push commit
        if: steps.check_update.outputs.hasUpdate == 'true' || inputs.force_release == 'true'
        run: |
          cd ${{ env.laravel-directory }}
          git config user.email "${{ secrets.REPOSITORY_EMAIL }}"
          git config user.name "${{ github.actor }}"
          git add .
          git diff --staged --quiet || git commit -m "[BOT] API ${{ needs.download-new-version.outputs.api_version }} | release ${{ needs.download-new-version.outputs.release_tag }}"
          git push origin main

      - name: Create Release
        if: steps.check_update.outputs.hasUpdate == 'true' || inputs.force_release == 'true'
        run: |
          cd ${{ env.laravel-directory }}
          TAG="${{ needs.download-new-version.outputs.release_tag }}"
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag "$TAG" -m "Version $TAG (Telegram API ${{ needs.download-new-version.outputs.api_version }})"
          git push origin "$TAG"
