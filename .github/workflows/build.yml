  update-laravel-version-repo:
    runs-on: ubuntu-22.04
    needs: download-new-version
    if: needs.download-new-version.outputs.has_new_version == 'true' || inputs.force_release == 'true'
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Checkout api-parser (latest main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install deps
        run: |
          composer install --no-dev

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: '${{ secrets.GH_ACTION_TELEGRAM_REPOSITORIES }}'
          repository: ${{ env.laravel-repo }}
          path: ${{ env.laravel-directory }}

      - name: Generate files
        run: |
          rm -rf build
          php console telegram:generate php-new --useSpatie

      - name: Run PHP-CS-Fixer
        uses: erkenes/php-cs-fixer-action@php8.2-1.0.0

      - name: Copy files to repository
        run: |
          rm -rf ${{ env.laravel-directory }}/src
          mv build/Appto/TelegramBot ${{ env.laravel-directory }}/src

      - name: Push generate files to new branch
        run: |
          BRANCH="bot/api-${{ needs.download-new-version.outputs.api_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add .
          git commit -m "[BOT] API ${{ needs.download-new-version.outputs.api_version }} | release ${{ needs.download-new-version.outputs.release_tag }}"
          git push origin "$BRANCH" --force

